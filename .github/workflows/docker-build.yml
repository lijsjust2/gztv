name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（如 1.0.0）'
        required: true
        default: 'latest'
        type: string
      push_to_dockerhub:
        description: '是否上传到 Docker Hub'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine release version
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      # === 构建镜像（始终执行）===
      - name: Build AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          no-cache: true
          outputs: type=docker,dest=/tmp/gdtv-live-proxy-amd64.tar
          tags: gdtv-live-proxy:amd64

      - name: Build ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          no-cache: true
          outputs: type=docker,dest=/tmp/gdtv-live-proxy-arm64.tar
          tags: gdtv-live-proxy:arm64

      # === 上传到 Docker Hub（可选）===
      - name: Login to Docker Hub
        if: ${{ github.event_name == 'push' || inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push AMD64 to Docker Hub
        if: ${{ github.event_name == 'push' || inputs.push_to_dockerhub }}
        run: |
          docker load -i /tmp/gdtv-live-proxy-amd64.tar
          docker tag gdtv-live-proxy:amd64 ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:${{ steps.rel.outputs.version }}-amd64
          docker tag gdtv-live-proxy:amd64 ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:amd64
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:${{ steps.rel.outputs.version }}-amd64
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:amd64

      - name: Push ARM64 to Docker Hub
        if: ${{ github.event_name == 'push' || inputs.push_to_dockerhub }}
        run: |
          docker load -i /tmp/gdtv-live-proxy-arm64.tar
          docker tag gdtv-live-proxy:arm64 ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:${{ steps.rel.outputs.version }}-arm64
          docker tag gdtv-live-proxy:arm64 ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:arm64
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:${{ steps.rel.outputs.version }}-arm64
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:arm64

      - name: Create multi-arch manifest on Docker Hub
        if: ${{ github.event_name == 'push' || inputs.push_to_dockerhub }}
        run: |
          docker buildx imagetools create -t ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:${{ steps.rel.outputs.version }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:arm64

          if [ "${{ steps.rel.outputs.version }}" = "latest" ]; then
            docker buildx imagetools create -t ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:latest \
              ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:amd64 \
              ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:arm64
          fi

          echo "=== Docker Hub images pushed ==="
          docker buildx imagetools inspect ${{ secrets.DOCKERHUB_USERNAME }}/gdtv-live-proxy:${{ steps.rel.outputs.version }}

      # === 压缩镜像文件（始终执行）===
      - name: Compress image files
        run: |
          cd /tmp
          gzip -9 gdtv-live-proxy-amd64.tar
          gzip -9 gdtv-live-proxy-arm64.tar
          ls -lh *.tar.gz

      # === 创建 GitHub Release（始终执行）===
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.rel.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "GDTV Live Proxy v${{ steps.rel.outputs.version }}"
          files: |
            /tmp/gdtv-live-proxy-amd64.tar.gz
            /tmp/gdtv-live-proxy-arm64.tar.gz
          body: |
            ## GDTV Live Proxy v${{ steps.rel.outputs.version }}

            荔枝网(GDTV)直播源代理服务 - 全代理模式

            ### Releases 镜像文件

            可直接下载镜像文件并导入：

            | 架构 | 文件 | 大小 |
            |------|------|------|
            | AMD64 (x86_64) | `gdtv-live-proxy-amd64.tar.gz` | PC、服务器、云主机 |
            | ARM64 (aarch64) | `gdtv-live-proxy-arm64.tar.gz` | 树莓派、ARM 服务器 |

            ```bash
            # 下载并导入镜像（AMD64）
            wget https://github.com/lijsjust2/gztv/releases/download/v${{ steps.rel.outputs.version }}/gdtv-live-proxy-amd64.tar.gz
            docker load -i gdtv-live-proxy-amd64.tar.gz

            # 或 ARM64
            wget https://github.com/lijsjust2/gztv/releases/download/v${{ steps.rel.outputs.version }}/gdtv-live-proxy-arm64.tar.gz
            docker load -i gdtv-live-proxy-arm64.tar.gz

            # 运行容器
            docker run -d \
              --name gdtv-proxy \
              -p 5678:5678 \
              -e TZ=Asia/Shanghai \
              --restart unless-stopped \
              gdtv-live-proxy:amd64

            # 访问 http://<IP>:5678 获取直播源列表
            ```

            ${{
              if github.event_name == 'push' || inputs.push_to_dockerhub == 'true' then
            '### Docker Hub 镜像

            镜像已推送到 Docker Hub:

            ```bash
            docker pull lijsfun/gdtv-live-proxy:' + steps.rel.outputs.version + '
            ```

            ```bash
            # 快速部署
            docker run -d \
              --name gdtv-proxy \
              -p 5678:5678 \
              -e TZ=Asia/Shanghai \
              --restart unless-stopped \
              lijsfun/gdtv-live-proxy:' + steps.rel.outputs.version + '
            ```
            '
              else ''
            }}

            ### 支持架构
            - **AMD64** (x86_64) - 普通 PC、服务器、云主机
            - **ARM64** (aarch64) - 树莓派、ARM 服务器

            ### 环境变量

            | 变量 | 说明 | 默认值 |
            |------|------|--------|
            | `gport` | 服务端口 | 5678 |
            | `ghost` | 公网访问地址 | 空 |
            | `gpass` | 访问密码 | 空 |

            ### 使用示例

            ```bash
            # 自定义端口和密码
            docker run -d \
              --name gdtv-proxy \
              -p 8080:8080 \
              -e gport=8080 \
              -e gpass=mypassword \
              -e TZ=Asia/Shanghai \
              --restart unless-stopped \
              gdtv-live-proxy:amd64

            # 访问 http://<IP>:8080/mypassword 获取直播源
            ```
          draft: false
          prerelease: false